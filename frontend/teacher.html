<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>GeoAttend — Teacher Portal</title>
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            padding-top: 0;
            padding-bottom: 80px;
            background: var(--bg-deep);
        }

        .top-bar {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .brand {
            font-size: 1.05rem;
            font-weight: 800;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .page-wrap {
            padding: 18px 16px;
            max-width: 700px;
            margin: 0 auto;
        }

        /* Session Card */
        .session-card {
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            margin-bottom: 14px;
            transition: var(--transition);
        }

        .session-card.live {
            background: rgba(16, 185, 129, 0.05);
            border-color: rgba(16, 185, 129, 0.35);
            box-shadow: 0 0 28px rgba(16, 185, 129, 0.07);
        }

        /* Form fields within card */
        .field-label {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .field-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 13px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: var(--font);
            outline: none;
            transition: var(--transition);
            -webkit-appearance: none;
            appearance: none;
        }

        .field-input:focus {
            border-color: var(--accent-3);
        }

        .field-input option {
            background: #1a1a2e;
        }

        .field-wrap {
            margin-bottom: 12px;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--safe);
            margin-right: 5px;
            animation: pulse 1.5s infinite;
        }

        /* Active info chips */
        .info-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .chip {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 100px;
            padding: 4px 10px;
            font-size: 0.73rem;
            color: #a5b4fc;
        }

        .chip.green {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        /* Stats strip */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .stat-tile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 13px;
            text-align: center;
        }

        .stat-tile .tv {
            font-size: 1.4rem;
            font-weight: 900;
            background: var(--gradient-hero);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-tile .tl {
            font-size: 0.65rem;
            color: var(--text-subtle);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-top: 2px;
        }

        /* Tabs for present/absent */
        .list-tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 14px;
        }

        .list-tab {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }

        .list-tab.active {
            color: var(--accent-3);
            border-bottom-color: var(--accent-3);
        }

        /* Student rows */
        .s-list {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        .s-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            animation: slideIn 0.2s ease;
        }

        .s-row:last-child {
            border-bottom: none;
        }

        .s-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--gradient-hero);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: white;
            flex-shrink: 0;
        }

        .s-avatar.absent {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.4), rgba(220, 38, 38, 0.4));
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .s-meta {
            flex: 1;
            min-width: 0;
        }

        .s-name {
            font-size: 0.88rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .s-detail {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .s-right {
            flex-shrink: 0;
            text-align: right;
        }

        .dist-badge {
            background: rgba(16, 185, 129, 0.1);
            color: var(--safe);
            border-radius: 100px;
            padding: 3px 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .absent-badge {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border-radius: 100px;
            padding: 3px 8px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        .empty {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-subtle);
        }

        .empty .ei {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .empty p {
            font-size: 0.82rem;
        }

        /* Bottom nav */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 8px 0 env(safe-area-inset-bottom, 8px);
            z-index: 100;
        }

        .nav-tab {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 8px 4px;
            background: none;
            border: none;
            cursor: pointer;
            transition: var(--transition);
            font-family: var(--font);
        }

        .nav-tab .ni {
            font-size: 1.2rem;
        }

        .nav-tab .nl {
            font-size: 0.63rem;
            color: var(--text-subtle);
        }

        .nav-tab.active .nl {
            color: var(--accent-3);
        }

        @media (min-width:600px) {
            body {
                max-width: 700px;
                margin: 0 auto;
            }

            .bottom-nav {
                max-width: 700px;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <div class="brand">📍 GeoAttend</div>
        <div style="display:flex;align-items:center;gap:8px;">
            <span id="teacherNameNav" style="font-size:0.78rem;color:var(--text-muted);"></span>
            <button class="btn btn-outline" onclick="doSignOut()" style="padding:6px 12px;font-size:0.78rem;">Sign
                Out</button>
        </div>
    </div>

    <div class="page-wrap">
        <h1 style="font-size:1.35rem;margin-bottom:4px;">👩‍🏫 Teacher Portal</h1>
        <p style="color:var(--text-muted);font-size:0.82rem;margin-bottom:18px;">Start a class-targeted session. Only
            students from that class can mark attendance.</p>

        <div id="alertBox" class="alert" style="margin-bottom:14px;"></div>

        <!-- ── Session Card ── -->
        <div id="sessionCard" class="session-card">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
                <div id="sessionIcon" style="font-size:1.4rem;">📡</div>
                <div>
                    <div style="font-weight:700;font-size:0.95rem;" id="sessionTitle">Start a New Session</div>
                    <div style="font-size:0.78rem;color:var(--text-muted);" id="sessionSub">Fill in the details below
                    </div>
                </div>
            </div>

            <!-- Inactive: form fields -->
            <div id="startForm">
                <div class="field-wrap">
                    <div class="field-label">📚 Subject Name</div>
                    <input class="field-input" type="text" id="subjectInput" placeholder="e.g. Data Structures"
                        maxlength="60" />
                </div>

                <div class="grid-3" style="margin-bottom:10px;">
                    <div>
                        <div class="field-label">Year / Class</div>
                        <select class="field-input" id="targetClass">
                            <option value="">All Classes</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    <div>
                        <div class="field-label">Section</div>
                        <input class="field-input" type="text" id="targetSection" placeholder="e.g. E1, CS-2A..."
                            maxlength="20" />
                    </div>
                    <div>
                        <div class="field-label">Branch</div>
                        <select class="field-input" id="targetBranch">
                            <option value="">All Branches</option>
                            <option value="CSE">CSE</option>
                            <option value="IT">IT</option>
                            <option value="ECE">ECE</option>
                            <option value="EEE">EEE</option>
                            <option value="ME">ME</option>
                            <option value="CE">CE</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-primary" onclick="startAttendance()" style="width:100%;">
                    <span id="startBtnText">📡 Start Session</span>
                    <div class="spinner" id="startSpinner"></div>
                </button>
            </div>

            <!-- Active: info chips -->
            <div id="activeChips" class="info-chips" style="display:none;"></div>
            <div class="btn-row" id="endBtnRow" style="display:none;">
                <button class="btn btn-outline" onclick="endAttendance()"
                    style="flex:1;border-color:var(--danger);color:var(--danger);">⏹ End Session</button>
            </div>
        </div>

        <!-- Stats -->
        <div id="statsStrip" class="stats-strip" style="display:none;">
            <div class="stat-tile">
                <div class="tv" id="statPresent">0</div>
                <div class="tl">Present</div>
            </div>
            <div class="stat-tile">
                <div class="tv" id="statAbsent">—</div>
                <div class="tl">Absent</div>
            </div>
            <div class="stat-tile">
                <div class="tv">100m</div>
                <div class="tl">Radius</div>
            </div>
        </div>

        <!-- Present / Absent list -->
        <div id="listSection" style="display:none;">
            <div class="list-tabs">
                <button class="list-tab active" id="tabPresent" onclick="showTab('present')">✅ Present (<span
                        id="presentCount">0</span>)</button>
                <button class="list-tab" id="tabAbsent" onclick="showTab('absent')">🔴 Absent (<span
                        id="absentCount">—</span>)</button>
            </div>
            <div id="presentList" class="s-list"></div>
            <div id="absentList" class="s-list" style="display:none;"></div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="bottom-nav">
        <button class="nav-tab active" onclick="">
            <span class="ni">📡</span><span class="nl">Session</span>
        </button>
        <button class="nav-tab" onclick="window.location.href='teacher-dashboard.html'">
            <span class="ni">📊</span><span class="nl">My Dashboard</span>
        </button>
        <button class="nav-tab" onclick="window.location.href='profile.html'">
            <span class="ni">👤</span><span class="nl">Profile</span>
        </button>
    </nav>

    <script type="module">
        import {
            getSession, getProfile, signOut,
            startSession, endSession, getActiveSession,
            getSessionRecords, getAbsentees, subscribeToRecords
        } from './supabase-client.js';

        let currentSession = null, currentUser = null, currentProfile = null;
        let recordsSub = null, records = [], absentees = [];
        let activeTab = 'present';

        // ── Auth ─────────────────────────────────────
        (async () => {
            const session = await getSession();
            if (!session) { window.location.href = 'login.html'; return; }
            currentUser = session.user;
            currentProfile = await getProfile();
            if (currentProfile?.role !== 'teacher') { window.location.href = 'index.html'; return; }
            document.getElementById('teacherNameNav').textContent = currentProfile.full_name || currentUser.email;
            await checkExistingSession();
        })();

        async function checkExistingSession() {
            try {
                const s = await getActiveSession();
                if (s && s.teacher_id === currentUser.id) {
                    currentSession = s;
                    showActiveUI();
                    await loadEverything();
                }
            } catch (e) { }
        }

        // ── Start ────────────────────────────────────
        window.startAttendance = () => {
            const subject = document.getElementById('subjectInput').value.trim();
            if (!subject) { showAlert('error', '❌ Enter a subject name first.'); document.getElementById('subjectInput').focus(); return; }

            const tClass = document.getElementById('targetClass').value;
            const tSection = document.getElementById('targetSection').value;
            const tBranch = document.getElementById('targetBranch').value;

            setBtnLoading(true);
            showAlert('info', '📡 Fetching GPS location...');

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { latitude: lat, longitude: lng } = pos.coords;
                try {
                    const name = currentProfile.full_name || currentUser.email;
                    currentSession = await startSession(currentUser.id, name, subject, tClass, tSection, tBranch, lat, lng, 100);
                    showAlert('success', `✅ "${subject}" session live! ${buildTargetLabel()} within 100m can check in.`);
                    showActiveUI();
                    await loadEverything();
                } catch (err) { showAlert('error', err.message); setBtnLoading(false); }
            }, (err) => { showAlert('error', '❌ GPS: ' + err.message); setBtnLoading(false); }, { enableHighAccuracy: true, timeout: 10000 });
        };

        // ── End ──────────────────────────────────────
        window.endAttendance = async () => {
            if (!currentSession) return;
            await endSession(currentUser.id);
            showAlert('info', `⏹ Session ended. ${records.length} present.`);
            currentSession = null; records = []; absentees = [];
            if (recordsSub) recordsSub.unsubscribe();
            showInactiveUI();
        };

        // ── Data ────────────────────────────────────
        async function loadEverything() {
            records = await getSessionRecords(currentSession.id);
            absentees = await getAbsentees(currentSession);
            renderLists();
            subscribeRealtime();
        }

        function subscribeRealtime() {
            if (recordsSub) recordsSub.unsubscribe();
            import('./supabase-client.js').then(({ subscribeToRecords }) => {
                recordsSub = subscribeToRecords(currentSession.id, async (payload) => {
                    if (payload.new) {
                        records.unshift(payload.new);
                        absentees = await getAbsentees(currentSession);
                        renderLists();
                    }
                });
            });
        }

        // ── Render ───────────────────────────────────
        function renderLists() {
            const pCount = records.length;
            const aCount = absentees.length;
            document.getElementById('statPresent').textContent = pCount;
            document.getElementById('statAbsent').textContent = aCount;
            document.getElementById('presentCount').textContent = pCount;
            document.getElementById('absentCount').textContent = aCount;

            // Present
            document.getElementById('presentList').innerHTML = pCount === 0 ?
                `<div class="empty"><div class="ei">⏳</div><p>Waiting for students to check in...</p></div>` :
                records.map(r => {
                    const init = (r.student_name || 'S').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
                    const time = new Date(r.marked_at).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
                    const detail = [r.roll_number, r.class_name, r.section && `Sec ${r.section}`, r.branch].filter(Boolean).join(' • ');
                    return `<div class="s-row">
            <div class="s-avatar">${init}</div>
            <div class="s-meta"><div class="s-name">${r.student_name || 'Unknown'}</div><div class="s-detail">${detail}</div><div class="s-detail">🕐 ${time}</div></div>
            <div class="s-right"><div class="dist-badge">📍 ${r.distance_m ?? '—'}m</div></div>
          </div>`;
                }).join('');

            // Absent
            document.getElementById('absentList').innerHTML = aCount === 0 ?
                `<div class="empty"><div class="ei">🎉</div><p>Everyone is present!</p></div>` :
                absentees.map(s => {
                    const init = (s.full_name || '?').split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
                    const detail = [s.roll_number, s.class_name, s.section && `Sec ${s.section}`, s.branch].filter(Boolean).join(' • ');
                    return `<div class="s-row">
            <div class="s-avatar absent">${init}</div>
            <div class="s-meta"><div class="s-name">${s.full_name || 'Unknown'}</div><div class="s-detail">${detail}</div></div>
            <div class="s-right"><div class="absent-badge">Absent</div></div>
          </div>`;
                }).join('');
        }

        // ── Tabs ─────────────────────────────────────
        window.showTab = (tab) => {
            activeTab = tab;
            document.getElementById('tabPresent').className = 'list-tab' + (tab === 'present' ? ' active' : '');
            document.getElementById('tabAbsent').className = 'list-tab' + (tab === 'absent' ? ' active' : '');
            document.getElementById('presentList').style.display = tab === 'present' ? 'flex' : 'none';
            document.getElementById('absentList').style.display = tab === 'absent' ? 'flex' : 'none';
            document.getElementById('presentList').style.flexDirection = 'column';
        };

        // ── UI helpers ────────────────────────────────
        function showActiveUI() {
            document.getElementById('sessionCard').className = 'session-card live';
            document.getElementById('sessionIcon').textContent = '🟢';
            document.getElementById('sessionTitle').innerHTML = `<span class="pulse-dot"></span> Session Live`;
            document.getElementById('sessionSub').textContent = `${currentSession.subject_name} · ${buildTargetLabel()}`;
            document.getElementById('startForm').style.display = 'none';
            document.getElementById('endBtnRow').style.display = 'flex';
            document.getElementById('statsStrip').style.display = 'grid';
            document.getElementById('listSection').style.display = 'block';

            const chips = [
                `📚 ${currentSession.subject_name}`,
                currentSession.target_class && `🎓 ${currentSession.target_class}`,
                currentSession.target_section && `Section ${currentSession.target_section}`,
                currentSession.target_branch && `🔬 ${currentSession.target_branch}`,
                `📍 ${parseFloat(currentSession.lat).toFixed(4)}, ${parseFloat(currentSession.lng).toFixed(4)}`,
                '📏 100m radius'
            ].filter(Boolean);

            document.getElementById('activeChips').style.display = 'flex';
            document.getElementById('activeChips').innerHTML = chips.map(c => `<div class="chip">${c}</div>`).join('');
            setBtnLoading(false);
        }

        function showInactiveUI() {
            document.getElementById('sessionCard').className = 'session-card';
            document.getElementById('sessionIcon').textContent = '📡';
            document.getElementById('sessionTitle').textContent = 'Start a New Session';
            document.getElementById('sessionSub').textContent = 'Fill in the details below';
            document.getElementById('startForm').style.display = 'block';
            document.getElementById('endBtnRow').style.display = 'none';
            document.getElementById('activeChips').style.display = 'none';
            document.getElementById('statsStrip').style.display = 'none';
            document.getElementById('listSection').style.display = 'none';
        }

        function buildTargetLabel() {
            const s = currentSession;
            const parts = [s?.target_branch, s?.target_class, s?.target_section && `Sec ${s.target_section}`].filter(Boolean);
            return parts.length ? parts.join(', ') : 'All students';
        }

        function showAlert(type, msg) {
            const el = document.getElementById('alertBox');
            el.className = `alert alert-${type} show`;
            el.innerHTML = `<span></span><span>${msg}</span>`;
        }

        function setBtnLoading(loading) {
            document.getElementById('startBtnText').textContent = loading ? 'Getting GPS...' : '📡 Start Session';
            document.getElementById('startSpinner').className = loading ? 'spinner active' : 'spinner';
            document.getElementById('startBtn') && (document.getElementById('startBtn').disabled = loading);
        }

        window.doSignOut = async () => {
            if (currentSession) await endSession(currentUser.id).catch(() => { });
            await signOut(); window.location.href = 'login.html';
        };
    </script>
</body>

</html>
